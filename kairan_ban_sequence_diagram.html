<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans, sans-serif); background: transparent; padding: 16px 0; }
h2.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

.seq-wrap { width: 100%; overflow-x: auto; }
svg text { font-family: var(--font-sans, sans-serif); }

.actor-label { font-size: 12px; font-weight: 500; fill: var(--color-text-primary, #222); }
.msg-label { font-size: 11px; fill: var(--color-text-secondary, #555); }
.group-label { font-size: 11px; font-weight: 500; }
.step-num { font-size: 10px; font-weight: 500; }

.actor-box { rx: 6; }
.lifeline { stroke-dasharray: 4 3; stroke-width: 0.8; }
.msg-line { stroke-width: 1.2; }
.msg-return { stroke-width: 1; stroke-dasharray: 4 3; }
.group-box { rx: 6; fill-opacity: 0.04; stroke-width: 0.5; stroke-dasharray: 5 3; }
</style>
</head>
<body>
<h2 class="sr-only">回覧板アプリのシーケンス図：住民がLINEアプリを開いてからお知らせを既読にするまでの全体フロー</h2>
<div class="seq-wrap">
<svg width="100%" viewBox="0 0 780 820" role="img">
<title>回覧板アプリ シーケンス図</title>
<desc>住民・役員がLINEアプリを操作してからSupabaseにデータが保存されるまでの外部API連携フロー</desc>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ===== ACTORS ===== -->
<!-- 住民/役員: x=60, LINE Platform: x=185, LIFF/Vercel: x=320, Backend/Render: x=460, Supabase: x=600, LINE Messaging: x=720 -->

<!-- Actor boxes top -->
<g>
  <!-- 住民・役員 -->
  <rect x="16" y="18" width="88" height="38" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text class="actor-label" x="60" y="34" text-anchor="middle" dominant-baseline="central">住民・役員</text>
  <text class="msg-label" x="60" y="50" text-anchor="middle" dominant-baseline="central">LINEユーザー</text>

  <!-- LINE Platform -->
  <rect x="141" y="18" width="88" height="38" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
  <text class="actor-label" x="185" y="34" text-anchor="middle" dominant-baseline="central">LINE Platform</text>
  <text class="msg-label" x="185" y="50" text-anchor="middle" dominant-baseline="central">LIFF / OAuth</text>

  <!-- Vercel (Frontend) -->
  <rect x="276" y="18" width="88" height="38" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text class="actor-label" x="320" y="34" text-anchor="middle" dominant-baseline="central">Vercel</text>
  <text class="msg-label" x="320" y="50" text-anchor="middle" dominant-baseline="central">React / LIFF SDK</text>

  <!-- Render (Backend) -->
  <rect x="416" y="18" width="88" height="38" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text class="actor-label" x="460" y="34" text-anchor="middle" dominant-baseline="central">Render.com</text>
  <text class="msg-label" x="460" y="50" text-anchor="middle" dominant-baseline="central">Node.js / Hono</text>

  <!-- Supabase -->
  <rect x="556" y="18" width="88" height="38" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
  <text class="actor-label" x="600" y="34" text-anchor="middle" dominant-baseline="central">Supabase</text>
  <text class="msg-label" x="600" y="50" text-anchor="middle" dominant-baseline="central">PostgreSQL</text>

  <!-- LINE Messaging API -->
  <rect x="676" y="18" width="88" height="38" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
  <text class="actor-label" x="720" y="34" text-anchor="middle" dominant-baseline="central">LINE Messaging</text>
  <text class="msg-label" x="720" y="50" text-anchor="middle" dominant-baseline="central">Push通知</text>
</g>

<!-- Lifelines -->
<line class="lifeline" x1="60"  y1="56" x2="60"  y2="790" stroke="#1D9E75"/>
<line class="lifeline" x1="185" y1="56" x2="185" y2="790" stroke="#378ADD"/>
<line class="lifeline" x1="320" y1="56" x2="320" y2="790" stroke="#7F77DD"/>
<line class="lifeline" x1="460" y1="56" x2="460" y2="790" stroke="#BA7517"/>
<line class="lifeline" x1="600" y1="56" x2="600" y2="790" stroke="#3B6D11"/>
<line class="lifeline" x1="720" y1="56" x2="720" y2="790" stroke="#378ADD"/>

<!-- ===== GROUP 1: LINEログイン ===== -->
<rect class="group-box" x="8" y="72" width="756" height="120" stroke="#7F77DD"/>
<text class="group-label" x="16" y="86" fill="#534AB7">① LINEログイン / LIFF初期化</text>

<!-- 1. 住民がLIFF URLをタップ -->
<line class="msg-line" x1="60" y1="100" x2="176" y2="100" stroke="#1D9E75" marker-end="url(#arr)"/>
<text class="msg-label" x="118" y="95" text-anchor="middle">LIFF URL をタップ</text>

<!-- 2. LINE OAuth認証 -->
<line class="msg-line" x1="185" y1="115" x2="311" y2="115" stroke="#378ADD" marker-end="url(#arr)"/>
<text class="msg-label" x="248" y="110" text-anchor="middle">LINEログイン認証</text>

<!-- 3. liff.init() -->
<line class="msg-line" x1="320" y1="130" x2="176" y2="130" stroke="#7F77DD" marker-end="url(#arr)"/>
<text class="msg-label" x="248" y="125" text-anchor="middle">liff.init() + getProfile()</text>

<!-- 4. プロフィール返却 -->
<line class="msg-return" x1="185" y1="145" x2="311" y2="145" stroke="#378ADD" marker-end="url(#arr)"/>
<text class="msg-label" x="248" y="140" text-anchor="middle">LINEプロフィール返却</text>

<!-- 5. users/sync -->
<line class="msg-line" x1="320" y1="160" x2="451" y2="160" stroke="#7F77DD" marker-end="url(#arr)"/>
<text class="msg-label" x="390" y="155" text-anchor="middle">POST /api/users/sync</text>

<!-- 6. Supabase upsert -->
<line class="msg-line" x1="460" y1="175" x2="591" y2="175" stroke="#BA7517" marker-end="url(#arr)"/>
<text class="msg-label" x="530" y="170" text-anchor="middle">users テーブル upsert</text>

<!-- ===== GROUP 2: お知らせ一覧 ===== -->
<rect class="group-box" x="8" y="202" width="756" height="110" stroke="#3B6D11"/>
<text class="group-label" x="16" y="216" fill="#3B6D11">② お知らせ一覧表示</text>

<!-- 7. GET posts -->
<line class="msg-line" x1="320" y1="232" x2="451" y2="232" stroke="#7F77DD" marker-end="url(#arr)"/>
<text class="msg-label" x="390" y="227" text-anchor="middle">GET /api/posts</text>

<!-- 8. Supabase select -->
<line class="msg-line" x1="460" y1="247" x2="591" y2="247" stroke="#BA7517" marker-end="url(#arr)"/>
<text class="msg-label" x="530" y="242" text-anchor="middle">posts テーブル SELECT</text>

<!-- 9. 結果返却 -->
<line class="msg-return" x1="460" y1="262" x2="591" y2="262" stroke="#3B6D11" marker-end="url(#arr-dash)"/>
<text class="msg-label" x="530" y="257" text-anchor="middle">投稿データ返却</text>

<!-- 10. 一覧表示 -->
<line class="msg-return" x1="320" y1="277" x2="451" y2="277" stroke="#BA7517" marker-end="url(#arr-dash)"/>
<text class="msg-label" x="390" y="272" text-anchor="middle">一覧JSON返却</text>

<!-- 11. 画面描画 -->
<line class="msg-return" x1="60" y1="292" x2="311" y2="292" stroke="#7F77DD" marker-end="url(#arr-dash)"/>
<text class="msg-label" x="185" y="287" text-anchor="middle">お知らせ一覧を画面描画</text>

<!-- ===== GROUP 3: 既読登録 ===== -->
<rect class="group-box" x="8" y="322" width="756" height="110" stroke="#BA7517"/>
<text class="group-label" x="16" y="336" fill="#854F0B">③ 既読ボタンをタップ</text>

<!-- 12. 既読ボタン -->
<line class="msg-line" x1="60" y1="352" x2="311" y2="352" stroke="#1D9E75" marker-end="url(#arr)"/>
<text class="msg-label" x="185" y="347" text-anchor="middle">既読ボタンをタップ</text>

<!-- 13. POST reads -->
<line class="msg-line" x1="320" y1="367" x2="451" y2="367" stroke="#7F77DD" marker-end="url(#arr)"/>
<text class="msg-label" x="390" y="362" text-anchor="middle">POST /api/posts/:id/read</text>

<!-- 14. reads insert -->
<line class="msg-line" x1="460" y1="382" x2="591" y2="382" stroke="#BA7517" marker-end="url(#arr)"/>
<text class="msg-label" x="530" y="377" text-anchor="middle">reads テーブル INSERT</text>

<!-- 15. 完了返却 -->
<line class="msg-return" x1="320" y1="397" x2="451" y2="397" stroke="#BA7517" marker-end="url(#arr-dash)"/>
<text class="msg-label" x="390" y="392" text-anchor="middle">既読完了レスポンス</text>

<!-- 16. UI更新 -->
<line class="msg-return" x1="60" y1="412" x2="311" y2="412" stroke="#7F77DD" marker-end="url(#arr-dash)"/>
<text class="msg-label" x="185" y="407" text-anchor="middle">既読バッジ更新</text>

<!-- ===== GROUP 4: 役員が投稿 ===== -->
<rect class="group-box" x="8" y="442" width="756" height="150" stroke="#534AB7"/>
<text class="group-label" x="16" y="456" fill="#534AB7">④ 役員がお知らせを投稿</text>

<!-- 17. 投稿フォーム -->
<line class="msg-line" x1="60" y1="472" x2="311" y2="472" stroke="#1D9E75" marker-end="url(#arr)"/>
<text class="msg-label" x="185" y="467" text-anchor="middle">投稿フォームを送信</text>

<!-- 18. POST posts -->
<line class="msg-line" x1="320" y1="487" x2="451" y2="487" stroke="#7F77DD" marker-end="url(#arr)"/>
<text class="msg-label" x="390" y="482" text-anchor="middle">POST /api/posts（役員のみ）</text>

<!-- 19. posts insert -->
<line class="msg-line" x1="460" y1="502" x2="591" y2="502" stroke="#BA7517" marker-end="url(#arr)"/>
<text class="msg-label" x="530" y="497" text-anchor="middle">posts テーブル INSERT</text>

<!-- 20. 全住民を取得 -->
<line class="msg-line" x1="460" y1="517" x2="591" y2="517" stroke="#BA7517" marker-end="url(#arr)"/>
<text class="msg-label" x="530" y="512" text-anchor="middle">users テーブル SELECT ALL</text>

<!-- 21. LINE Push通知 -->
<line class="msg-line" x1="460" y1="532" x2="711" y2="532" stroke="#BA7517" marker-end="url(#arr)"/>
<text class="msg-label" x="586" y="527" text-anchor="middle">Messaging API Broadcast</text>

<!-- 22. LINE通知受信 -->
<line class="msg-return" x1="60" y1="547" x2="176" y2="547" stroke="#378ADD" marker-end="url(#arr-dash)"/>
<text class="msg-label" x="118" y="542" text-anchor="middle">プッシュ通知受信</text>

<!-- 23. 投稿完了 -->
<line class="msg-return" x1="60" y1="562" x2="311" y2="562" stroke="#7F77DD" marker-end="url(#arr-dash)"/>
<text class="msg-label" x="185" y="557" text-anchor="middle">投稿完了レスポンス</text>

<!-- ===== GROUP 5: 既読管理ダッシュボード ===== -->
<rect class="group-box" x="8" y="602" width="756" height="110" stroke="#1D9E75"/>
<text class="group-label" x="16" y="616" fill="#0F6E56">⑤ 役員が既読状況を確認</text>

<!-- 24. ダッシュボード -->
<line class="msg-line" x1="60" y1="632" x2="311" y2="632" stroke="#1D9E75" marker-end="url(#arr)"/>
<text class="msg-label" x="185" y="627" text-anchor="middle">ダッシュボードを開く</text>

<!-- 25. GET reads -->
<line class="msg-line" x1="320" y1="647" x2="451" y2="647" stroke="#7F77DD" marker-end="url(#arr)"/>
<text class="msg-label" x="390" y="642" text-anchor="middle">GET /api/posts/:id/reads</text>

<!-- 26. reads + users JOIN -->
<line class="msg-line" x1="460" y1="662" x2="591" y2="662" stroke="#BA7517" marker-end="url(#arr)"/>
<text class="msg-label" x="530" y="657" text-anchor="middle">reads + users JOIN</text>

<!-- 27. 既読者一覧 -->
<line class="msg-return" x1="320" y1="677" x2="451" y2="677" stroke="#BA7517" marker-end="url(#arr-dash)"/>
<text class="msg-label" x="390" y="672" text-anchor="middle">既読者一覧返却</text>

<!-- 28. 画面表示 -->
<line class="msg-return" x1="60" y1="692" x2="311" y2="692" stroke="#7F77DD" marker-end="url(#arr-dash)"/>
<text class="msg-label" x="185" y="687" text-anchor="middle">既読率・未読者リスト表示</text>

<!-- ===== Actor boxes bottom ===== -->
<rect x="16"  y="754" width="88" height="38" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
<text class="actor-label" x="60"  y="770" text-anchor="middle" dominant-baseline="central">住民・役員</text>

<rect x="141" y="754" width="88" height="38" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
<text class="actor-label" x="185" y="770" text-anchor="middle" dominant-baseline="central">LINE Platform</text>

<rect x="276" y="754" width="88" height="38" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
<text class="actor-label" x="320" y="770" text-anchor="middle" dominant-baseline="central">Vercel</text>

<rect x="416" y="754" width="88" height="38" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
<text class="actor-label" x="460" y="770" text-anchor="middle" dominant-baseline="central">Render.com</text>

<rect x="556" y="754" width="88" height="38" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
<text class="actor-label" x="600" y="770" text-anchor="middle" dominant-baseline="central">Supabase</text>

<rect x="676" y="754" width="88" height="38" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
<text class="actor-label" x="720" y="770" text-anchor="middle" dominant-baseline="central">LINE Messaging</text>

<!-- Legend -->
<line x1="16" y1="808" x2="60" y2="808" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
<text class="msg-label" x="68" y="812">リクエスト</text>
<line x1="150" y1="808" x2="194" y2="808" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-dash)"/>
<text class="msg-label" x="202" y="812">レスポンス</text>

</svg>
</div>
</body>
</html>
